<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ふぐば文庫</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    height: 100%;
    font-family: "UD デジタル 教科書体 NK-R", "UD Digi Kyokasho NK-R", "Noto Serif JP", serif;
    background: #faf8f2;
    color: #2a1a0a;
}
.page {
    max-width: 720px;
    margin: 0 auto;
    padding: 60px 24px;
}
h1 {
    font-size: 36px;
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: 0.15em;
}
.subtitle {
    text-align: center;
    font-size: 15px;
    color: #6a5a3a;
    margin-bottom: 48px;
}
.works {
    margin-top: 32px;
}
.works h2 {
    font-size: 20px;
    border-bottom: 2px solid #b0a060;
    padding-bottom: 6px;
    margin-bottom: 20px;
}
.work-card {
    display: block;
    background: #fff;
    border: 1px solid #e0dcd0;
    border-radius: 6px;
    padding: 20px 24px;
    margin-bottom: 16px;
    text-decoration: none;
    color: inherit;
    transition: box-shadow 0.15s, border-color 0.15s;
}
.work-card:hover {
    border-color: #b0a060;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.work-card .work-title {
    font-size: 20px;
    font-weight: bold;
    color: #2a1a0a;
    margin-bottom: 4px;
}
.work-card .work-author {
    font-size: 14px;
    color: #6a5a3a;
    margin-bottom: 8px;
}
.work-card .work-desc {
    font-size: 14px;
    color: #555;
    line-height: 1.7;
}
.about {
    margin-top: 48px;
    padding-top: 32px;
    border-top: 1px solid #e0dcd0;
}
.about h2 {
    font-size: 18px;
    margin-bottom: 12px;
}
.about p {
    font-size: 14px;
    line-height: 1.8;
    color: #555;
}
.about a {
    color: #6a5a3a;
}
footer {
    margin-top: 48px;
    text-align: center;
    font-size: 13px;
    color: #999;
}
</style>
</head>
<body>
<div class="page">

<h1>ふぐば文庫</h1>
<p class="subtitle">近代日本の古典を現代語訳で読む</p>

<div class="works">
<h2>翻訳一覧</h2>

<a href="shimizu-icc/" class="work-card">
    <div class="work-title">逐条帝国憲法講義</div>
    <div class="work-author">清水澄 著（現代語訳：ふぐば）</div>
    <div class="work-desc">枢密院議長を務めた憲法学者・清水澄による大日本帝国憲法の逐条解説。立法趣旨・比較法・実際の運用例を網羅した体系的註釈書の全文現代語訳。</div>
</a>

</div>

<div class="about">
<h2>このサイトについて</h2>
<p>ふぐば文庫は、近代日本の重要な法律・政治文献を現代語に訳し、広く読めるようにするプロジェクトです。底本はいずれも著作権保護期間の満了した作品を使用しています。</p>
<p style="margin-top: 12px;"><a href="https://twitter.com/Fuguba">ふぐば（@Fuguba）</a></p>
</div>

<footer>
&copy; ふぐば文庫
</footer>

</div>
</body>
</html>
